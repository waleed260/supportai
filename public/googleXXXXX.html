<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    ─────────────────────────────────────────────────────────────────
    Google Search Console Domain Verification
    ─────────────────────────────────────────────────────────────────
    Step 1: Go to https://search.google.com/search-console
    Step 2: Add your domain as a property (URL prefix method)
    Step 3: Choose "HTML file" verification method
    Step 4: Google will provide a filename like "google123abc456.html"
            and a meta tag with a content value.
    Step 5: RENAME this file to match Google's provided filename
            (e.g., google123abc456.html)
    Step 6: Update the content attribute below with the value
            from Google Search Console.
    Step 7: Deploy, then click "Verify" in Search Console.
    ─────────────────────────────────────────────────────────────────
  -->
  <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE" />
  <title>Google Search Console Verification</title>
</head>
<body>
  <p>This file is used to verify domain ownership for Google Search Console.</p>
  <p>After renaming and deploying, go back to Search Console and click "Verify".</p>
</body>
</html>
