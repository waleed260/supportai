<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#262626" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="floatShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="badge">
      <rect x="15" y="15" width="470" height="470" rx="110"/>
    </clipPath>
  </defs>

  <ellipse cx="250" cy="255" rx="235" ry="235" fill="#000" opacity="0.25"/>
  <rect x="15" y="15" width="470" height="470" rx="110" fill="#0A0A0A"/>
  <rect x="15" y="15" width="470" height="470" rx="110" fill="url(#bgGlow)" clip-path="url(#badge)"/>

  <g filter="url(#floatShadow)">
    <path d="M150 120 C150 60 350 60 350 120 C350 190 150 180 150 250 C150 320 350 310 350 380 C350 440 150 440 150 380"
          fill="none" stroke="#D4D4D4" stroke-width="140" stroke-linecap="round" stroke-linejoin="round"
          transform="translate(0, 8)"/>
    <path d="M150 120 C150 60 350 60 350 120 C350 190 150 180 150 250 C150 320 350 310 350 380 C350 440 150 440 150 380"
          fill="none" stroke="#FFFFFF" stroke-width="140" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
