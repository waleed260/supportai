  <circle cx="97" cy="73" r="2.8" fill="#fcd34d" opacity="0.8"/>
  <circle cx="119" cy="84" r="3.5" fill="#fcd34d"/>
  <circle cx="86" cy="95" r="2.8" fill="#fcd34d" opacity="0.8"/>
