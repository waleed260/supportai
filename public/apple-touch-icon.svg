<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1A1A1A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="bevelIn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#262626" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#0A0A0A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="glassOverlay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.015"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#737373" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#404040" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#1A1A1A" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="sDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8A8A8A"/>
      <stop offset="50%" stop-color="#404040"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="sMain" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#F5F5F5"/>
      <stop offset="70%" stop-color="#D4D4D4"/>
      <stop offset="100%" stop-color="#A3A3A3"/>
    </linearGradient>
    <linearGradient id="sHighlight" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#737373" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#A3A3A3" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#262626" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="badgeShadow">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="sShadow">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.75"/>
    </filter>
    <filter id="floatGlow">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <clipPath id="badgeClip">
      <rect width="180" height="180" rx="42"/>
    </clipPath>
  </defs>
  <rect width="180" height="180" rx="42" fill="#000" opacity="0.4" transform="translate(0, 7)" filter="url(#badgeShadow)"/>
  <rect x="2" y="2" width="176" height="176" rx="40" fill="#000000"/>
  <rect width="180" height="180" rx="42" fill="url(#bgBase)"/>
  <rect width="180" height="180" rx="42" fill="url(#bgGlow)" clip-path="url(#badgeClip)"/>
  <rect width="180" height="180" rx="42" fill="url(#bevelIn)" clip-path="url(#badgeClip)"/>
  <path d="M5 42 C5 20 20 5 42 5 L138 5 C160 5 175 20 175 42" fill="none" stroke="url(#glassEdge)" stroke-width="2.5"/>
  <rect x="3" y="3" width="174" height="174" rx="39" fill="url(#glassOverlay)"/>
  <ellipse cx="90" cy="90" rx="46" ry="46" fill="#FFFFFF" opacity="0.05" filter="url(#floatGlow)"/>
  <g filter="url(#sShadow)">
    <path d="M60 48 C60 30 120 30 120 48 C120 68 60 64 60 90 C60 116 120 112 120 132 C120 150 60 150 60 132"
          fill="none" stroke="#0A0A0A" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"
          transform="translate(5, 7)"/>
    <path d="M60 48 C60 30 120 30 120 48 C120 68 60 64 60 90 C60 116 120 112 120 132 C120 150 60 150 60 132"
          fill="none" stroke="#262626" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"
          transform="translate(3.5, 5)"/>
    <path d="M60 48 C60 30 120 30 120 48 C120 68 60 64 60 90 C60 116 120 112 120 132 C120 150 60 150 60 132"
          fill="none" stroke="url(#sDark)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"
          transform="translate(1.5, 2)"/>
    <path d="M60 48 C60 30 120 30 120 48 C120 68 60 64 60 90 C60 116 120 112 120 132 C120 150 60 150 60 132"
          fill="none" stroke="url(#sMain)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M60 48 C60 30 120 30 120 48 C120 68 60 64 60 90 C60 116 120 112 120 132 C120 150 60 150 60 132"
          fill="none" stroke="url(#sHighlight)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"
          transform="translate(-1, -1.2)"/>
  </g>
  <circle cx="90" cy="90" r="65" fill="none" stroke="url(#ringAccent)" stroke-width="1.5" stroke-dasharray="4 8"/>
  <g opacity="0.25">
    <circle cx="90" cy="25" r="3.2" fill="#A3A3A3"/>
    <circle cx="90" cy="155" r="3.2" fill="#A3A3A3"/>
    <circle cx="25" cy="90" r="3.2" fill="#A3A3A3"/>
    <circle cx="155" cy="90" r="3.2" fill="#A3A3A3"/>
  </g>
</svg>
