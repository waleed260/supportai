  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <circle cx="90" cy="90" r="62" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="4 6" opacity="0.45"/>
  <!-- Stylized S ribbon -->
  <path d="M64 62c0-6 5-11 11-11h22c6 0 11 5 11 11s-5 11-11 11H86c-6 0-11 5-11 11s5 11 11 11h22c6 0 11 5 11 11s-5 11-11 11H86c-6 0-11-5-11-11"
