<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="s3d">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <clipPath id="badge">
      <rect width="100" height="100" rx="24"/>
    </clipPath>
  </defs>

  <!-- White badge -->
  <rect width="100" height="100" rx="24" fill="#FFFFFF"/>
  <rect x="1" y="1" width="98" height="98" rx="23" fill="none" stroke="#E5E5E5" stroke-width="1"/>

  <g filter="url(#s3d)">
    <!-- 3D extrusion layer -->
    <path d="M30 26 C30 14 70 14 70 26 C70 40 30 38 30 50 C30 62 70 60 70 74 C70 86 30 86 30 74"
          fill="none" stroke="#A0A0A0" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"
          transform="translate(1.5, 2)"/>
    <!-- Main black S -->
    <path d="M30 26 C30 14 70 14 70 26 C70 40 30 38 30 50 C30 62 70 60 70 74 C70 86 30 86 30 74"
          fill="none" stroke="#000000" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
